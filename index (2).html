<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Scroll — On/Off Track Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0ede8;
            --accent-color: #c8f000;
            --text-color: #1a1a1a;
            --font-display: 'Bebas Neue', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            overflow-x: hidden;
        }

        .topo-bg {
            position: fixed;
            inset: 0;
            background-image: url('topo.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.12;
            pointer-events: none;
            z-index: -1;
        }

        .spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(0,0,0,0.25);
        }

        .battle-container {
            position: relative;
            width: 100%;
            height: 300vh; /* Increased scroll duration for smoother control */
        }

        .battle-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .battle-side {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .side-left { left: 0; }
        .side-right { right: 0; }

        .battle-img-wrap {
            position: relative;
            width: clamp(280px, 38vw, 550px);
            aspect-ratio: 1;
            margin-bottom: 2.5rem;
            will-change: transform, opacity;
        }

        .battle-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .reveal-wrap {
            position: relative;
            overflow: hidden;
            margin-bottom: 0.8rem;
            padding: 0.2rem 0.5rem;
        }

        .reveal-text {
            font-family: var(--font-display);
            font-size: clamp(4.5rem, 11vw, 9rem);
            line-height: 0.85;
            text-transform: uppercase;
            white-space: nowrap;
            display: block;
            will-change: transform, clip-path;
        }

        .reveal-block {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: var(--accent-color);
            z-index: 2;
            transform: scaleX(0);
            will-change: transform;
        }

        .side-right .reveal-block {
            background-color: var(--text-color);
        }

        .side-info {
            max-width: 320px;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            will-change: transform, opacity;
        }

        .side-info p {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.8rem;
            color: rgba(0,0,0,0.55);
            font-weight: 400;
        }

        .btn-circle {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background-color: var(--accent-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .side-right .btn-circle {
            background-color: var(--text-color);
            color: white;
        }

        .btn-circle:hover {
            transform: scale(1.15) rotate(15deg);
        }

        .center-line {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 1.5px;
            height: 0;
            background-color: rgba(0,0,0,0.08);
            z-index: 10;
        }

    </style>
</head>
<body>

    <div class="topo-bg"></div>

    <div class="spacer">Scroll Down to Enter the Track</div>

    <section class="battle-container" id="battle-section">
        <div class="battle-sticky">
            <div class="center-line" id="center-line"></div>

            <!-- Left Side: ON TRACK -->
            <div class="battle-side side-left" id="side-left">
                <div class="battle-img-wrap" id="img-wrap-left">
                    <img src="helmet.jpg" alt="Helmet" class="battle-img">
                </div>
                <div class="reveal-wrap">
                    <div class="reveal-block" id="block-left"></div>
                    <span class="reveal-text" id="text-left">ON TRACK</span>
                </div>
                <div class="side-info" id="info-left">
                    <p>Most recent results, career stats and photos from trackside.</p>
                    <div class="btn-circle">→</div>
                </div>
            </div>

            <!-- Right Side: OFF TRACK -->
            <div class="battle-side side-right" id="side-right">
                <div class="battle-img-wrap" id="img-wrap-right">
                    <img src="driver.jpg" alt="Lando" class="battle-img">
                </div>
                <div class="reveal-wrap">
                    <div class="reveal-block" id="block-right"></div>
                    <span class="reveal-text" id="text-right">OFF TRACK</span>
                </div>
                <div class="side-info" id="info-right">
                    <p>Campaigns, shoots and other such promotional materials for fans.</p>
                    <div class="btn-circle">→</div>
                </div>
            </div>
        </div>
    </section>

    <div class="spacer">Keep Exploring</div>

    <!-- GSAP Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#battle-section",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.2,
                pin: false
            }
        });

        // 1. Images Move Towards Center (Head-to-Head)
        tl.fromTo("#img-wrap-left", 
            { x: "-120%", opacity: 0, scale: 0.7 }, 
            { x: "12%", opacity: 1, scale: 1, duration: 1.2, ease: "power2.out" }, 0
        );
        tl.fromTo("#img-wrap-right", 
            { x: "120%", opacity: 0, scale: 0.7 }, 
            { x: "-12%", opacity: 1, scale: 1, duration: 1.2, ease: "power2.out" }, 0
        );

        // 2. Center Line
        tl.to("#center-line", { height: "65vh", duration: 0.6 }, 0.3);

        // 3. Block Reveal Animation (Synchronized with images)
        
        // Left Side Reveal
        tl.fromTo("#block-left", 
            { scaleX: 0, transformOrigin: "left" }, 
            { scaleX: 1, duration: 0.5, ease: "expo.inOut" }, 0.4
        );
        tl.fromTo("#text-left", 
            { clipPath: "inset(0 100% 0 0)", x: -40 }, 
            { clipPath: "inset(0 0% 0 0)", x: 25, duration: 0.8, ease: "power3.out" }, 0.5
        );
        tl.to("#block-left", { scaleX: 0, transformOrigin: "right", duration: 0.5, ease: "expo.inOut" }, 0.9);

        // Right Side Reveal
        tl.fromTo("#block-right", 
            { scaleX: 0, transformOrigin: "right" }, 
            { scaleX: 1, duration: 0.5, ease: "expo.inOut" }, 0.4
        );
        tl.fromTo("#text-right", 
            { clipPath: "inset(0 0 0 100%)", x: 40 }, 
            { clipPath: "inset(0 0 0 0%)", x: -25, duration: 0.8, ease: "power3.out" }, 0.5
        );
        tl.to("#block-right", { scaleX: 0, transformOrigin: "left", duration: 0.5, ease: "expo.inOut" }, 0.9);

        // 4. Info & Button Fades In
        tl.to("#info-left, #info-right", { 
            opacity: 1, 
            y: 0, 
            stagger: 0.15, 
            duration: 0.6, 
            ease: "back.out(1.7)" 
        }, 1.1);

    </script>
</body>
</html>
